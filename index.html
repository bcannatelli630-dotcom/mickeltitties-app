document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ding:16px 0 4px;\">M = Masters · P = PGA · U = U.S. Open · O = The Open. Lowest total wins (1st = 1 pt … 8th = 8); strokes break ties.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- cup -->\n          <sc-if value=\"{{isCup}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"padding:18px 22px 0; text-align:center;\">\n              <div style=\"font-family:var(--fb); font-weight:700; font-size:11px; letter-spacing:.16em; color:var(--mut);\">HOLDER OF<\u002Fdiv>\n              <div style=\"font-family:var(--fd); font-size:34px; color:var(--ink); line-height:1.02; margin-top:6px;\">The Mickeltitties Cup<\u002Fdiv>\n              <div style=\"font-family:var(--fb); font-weight:500; font-size:13px; color:var(--mut); margin-top:8px; max-width:300px; margin-left:auto; margin-right:auto;\">Awarded to the season's last-place finisher. Nobody is racing for this one.<\u002Fdiv>\n              <div style=\"margin:22px 22px 0; padding:26px 18px; background:var(--pan); border-radius:var(--rad);\">\n                <div style=\"font-family:var(--fn); font-weight:700; font-size:64px; color:var(--pnum); line-height:.8;\">{{cupHolder.ptsStr}}<\u002Fdiv>\n                <div style=\"font-family:var(--fd); font-size:30px; color:var(--pin); margin-top:10px; line-height:1;\">{{cupName}}<\u002Fdiv>\n                <div style=\"font-family:var(--fb); font-weight:600; font-size:12px; color:var(--psub); margin-top:6px; letter-spacing:.04em;\">DEAD LAST · {{cupHolder.strokesStr}} STROKES<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:22px 22px 6px;\">\n              <div style=\"font-family:var(--fb); font-weight:700; font-size:11px; letter-spacing:.09em; color:var(--mut); margin-bottom:4px;\">ON THE BUBBLE<\u002Fdiv>\n              <sc-for list=\"{{cupWatch}}\" as=\"w\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; align-items:center; gap:13px; padding:12px 0; border-bottom:1px solid var(--line);\">\n                  <span style=\"font-family:var(--fn); font-size:18px; color:var(--fnt); width:18px; text-align:center;\">{{w.r}}<\u002Fspan>\n                  <span style=\"flex:1; font-family:var(--fb); font-weight:600; font-size:15px; color:var(--ink);\">{{w.name}}<\u002Fspan>\n                  <span style=\"font-family:var(--fn); font-weight:700; font-size:18px; color:var(--ink);\">{{w.ptsStr}} pts<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- pots -->\n          <sc-if value=\"{{isPots}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"padding:16px 22px 0;\">\n              <div style=\"padding:16px 18px; background:var(--card); border:1px solid var(--line); border-radius:var(--rad); margin-bottom:14px;\">\n                <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n                  <div style=\"font-family:var(--fb); font-weight:700; font-size:10px; letter-spacing:.14em; color:var(--mut);\">OUTRIGHT WINNER POT<\u002Fdiv>\n                  <div style=\"font-family:var(--fn); font-weight:700; font-size:30px; color:var(--acc);\">{{winnerPotStr}}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:12px; padding-top:12px; border-top:1px solid var(--line);\">\n                  <sc-if value=\"{{winnerTaken}}\" hint-placeholder-val=\"{{true}}\">\n                    <div style=\"font-family:var(--fd); font-size:22px; color:var(--ink); line-height:1;\">{{winnerTaker}}<\u002Fdiv>\n                    <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:4px;\">drafted {{winnerGolfer}} · leads at {{winnerScoreStr}}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{noWinnerYet}}\" hint-placeholder-val=\"{{false}}\">\n                    <div style=\"font-family:var(--fd); font-size:22px; color:var(--mut); line-height:1;\">No leader yet<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-family:var(--fb); font-weight:500; font-size:11px; color:var(--fnt); margin-top:12px; line-height:1.5;\">{{winnerNote}}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:16px 18px; background:var(--card); border:1px solid var(--line); border-radius:var(--rad); margin-bottom:14px;\">\n                <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n                  <div style=\"font-family:var(--fb); font-weight:700; font-size:10px; letter-spacing:.14em; color:var(--mut);\">WINNING-SCORE POOL<\u002Fdiv>\n                  <div style=\"font-family:var(--fn); font-weight:700; font-size:30px; color:var(--acc);\">{{spPotStr}}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:12px; padding-top:12px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:baseline;\">\n                  <div style=\"font-family:var(--fb); font-weight:600; font-size:12px; color:var(--mut);\">Actual winning score<\u002Fdiv>\n                  <div style=\"font-family:var(--fn); font-weight:700; font-size:22px; color:var(--ink);\">{{spWinStr}}<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{spHas}}\" hint-placeholder-val=\"{{true}}\">\n                  <div style=\"display:flex; flex-direction:column; gap:6px; margin-top:12px;\">\n                    <sc-for list=\"{{spRows}}\" as=\"g\" hint-placeholder-count=\"4\">\n                      <sc-if value=\"{{g.win}}\" hint-placeholder-val=\"{{false}}\"><div style=\"display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--acc); color:var(--aci); border-radius:var(--rad);\"><span style=\"font-family:var(--fb); font-weight:700; font-size:13px;\">{{g.name}} ✓<\u002Fspan><span style=\"font-family:var(--fn); font-weight:700; font-size:14px;\">{{g.guessStr}}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                      <sc-if value=\"{{g.idle}}\" hint-placeholder-val=\"{{true}}\"><div style=\"display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-bottom:1px solid var(--line);\"><span style=\"font-family:var(--fb); font-weight:600; font-size:13px; color:var(--ink);\">{{g.name}}<\u002Fspan><span style=\"font-family:var(--fn); font-weight:700; font-size:14px; color:var(--mut);\">{{g.guessStr}}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{spNoEntrants}}\" hint-placeholder-val=\"{{false}}\"><div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:10px;\">No guesses in yet — add them in Settings → Pool.<\u002Fdiv><\u002Fsc-if>\n                <div style=\"font-family:var(--fb); font-weight:500; font-size:11px; color:var(--fnt); margin-top:12px; line-height:1.5;\">{{spNote}}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:20px 18px; background:var(--pan); border-radius:var(--rad); text-align:center;\">\n                <div style=\"font-family:var(--fb); font-weight:700; font-size:10px; letter-spacing:.18em; color:var(--psub);\">MISSED-CUT KITTY<\u002Fdiv>\n                <div style=\"font-family:var(--fn); font-weight:700; font-size:58px; color:var(--pnum); line-height:.85; margin-top:6px;\">{{potStr}}<\u002Fdiv>\n                <div style=\"font-family:var(--fb); font-weight:600; font-size:12px; color:var(--pin); margin-top:8px;\">{{potLeaderLine}}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:var(--fb); font-weight:500; font-size:11px; color:var(--fnt); text-align:center; padding:12px 6px 0;\">Every missed cut adds ${{mcDollarStr}} to the Kitty and it accumulates all season — it pays out once, at season's end, to whoever f value=\"{{settleHasData}}\" hint-placeholder-val=\"{{true}}\">\n              <div style=\"padding:14px 22px 0;\">\n                <sc-for list=\"{{transfers}}\" as=\"t\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex; align-items:center; gap:10px; padding:14px 0; border-bottom:1px solid var(--line);\">\n                    <span style=\"font-family:var(--fb); font-weight:600; font-size:15px; color:var(--ink);\">{{t.from}}<\u002Fspan>\n                    <span style=\"flex:1; text-align:center; font-family:var(--fb); font-weight:700; font-size:13px; color:var(--acc);\">pays →<\u002Fspan>\n                    <span style=\"font-family:var(--fb); font-weight:600; font-size:15px; color:var(--ink);\">{{t.to}}<\u002Fspan>\n                    <span style=\"width:56px; text-align:right; font-family:var(--fn); font-weight:700; font-size:18px; color:var(--ink);\">{{t.amtStr}}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"padding:18px 22px 0;\">\n                <button onclick=\"{{shareSettlement}}\" style=\"width:100%; padding:14px; border:none; background:var(--acc); color:var(--aci); font-family:var(--fb); font-weight:700; font-size:14px; border-radius:var(--rad); cursor:pointer;\">Show settlement card to screenshot<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"padding:18px 22px 0;\">\n                <div style=\"font-family:var(--fb); font-weight:700; font-size:11px; letter-spacing:.06em; color:var(--mut); margin-bottom:4px;\">NET FOR THE EVENT<\u002Fdiv>\n                <sc-for list=\"{{settleLines}}\" as=\"n\" hint-placeholder-count=\"8\">\n                  <div style=\"display:flex; align-items:center; padding:11px 0; border-bottom:1px solid var(--line);\">\n                    <span style=\"flex:1; font-family:var(--fb); font-weight:600; font-size:14px; color:var(--ink);\">{{n.name}}<\u002Fspan>\n                    <sc-if value=\"{{n.pos}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-family:var(--fn); font-weight:700; font-size:16px; color:#1F8A4C;\">{{n.amtStr}}<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{n.neg}}\" hint-placeholder-val=\"{{true}}\"><span style=\"font-family:var(--fn); font-weight:700; font-size:16px; color:#E5384E;\">{{n.amtStr}}<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{n.flat}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-family:var(--fn); font-weight:700; font-size:16px; color:var(--fnt);\">{{n.amtStr}}<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"font-family:var(--fb); font-weight:500; font-size:11px; color:var(--fnt); text-align:center; padding:16px 0 4px; line-height:1.5;\">Pot carryovers aren't shown as transfers — they're already-collected money the winner takes from the pot.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{settleEmpty}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"margin:16px 22px 0; padding:30px 22px; background:var(--card); border:1px solid var(--line); border-radius:var(--rad); text-align:center; font-family:var(--fb); font-weight:600; font-size:13px; color:var(--mut); line-height:1.5;\">Nothing to settle yet. Once the event finishes and the pots have winners, the payment plan appears here.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ================= RECORDS ================= -->\n      <sc-if value=\"{{isRecords}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"animation:mtUp .35s ease both;\">\n          <div style=\"padding:6px 22px 0;\">\n            <div style=\"font-family:var(--fd); font-size:30px; color:var(--ink); line-height:1;\">Records<\u002Fdiv>\n            <div style=\"font-family:var(--fb); font-weight:600; font-size:11px; letter-spacing:.1 x; border-radius:var(--rad);\">\n            <sc-for list=\"{{settingsTabs}}\" as=\"tb\" hint-placeholder-count=\"3\">\n              <sc-if value=\"{{tb.active}}\" hint-placeholder-val=\"{{true}}\"><div onclick=\"{{tb.onClick}}\" style=\"flex:1; text-align:center; padding:8px; background:var(--acc); color:var(--aci); border-radius:calc(var(--rad) - 1px); font-family:var(--fb); font-weight:700; font-size:12px; cursor:pointer;\">{{tb.label}}<\u002Fdiv><\u002Fsc-if>\n              <sc-if value=\"{{tb.idle}}\" hint-placeholder-val=\"{{false}}\"><div onclick=\"{{tb.onClick}}\" style=\"flex:1; text-align:center; padding:8px; color:var(--mut); font-family:var(--fb); font-weight:600; font-size:12px; cursor:pointer;\">{{tb.label}}<\u002Fdiv><\u002Fsc-if>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{isNamesTab}}\" hint-placeholder-val=\"{{true}}\">\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:14px; line-height:1.5;\">The eight names for the season. They flow through every screen; initials update automatically.<\u002Fdiv>\n            <div style=\"margin-top:14px; display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{nameFields}}\" as=\"f\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex; align-items:center; gap:12px;\">\n                  <span style=\"width:34px; height:34px; flex:none; display:flex; align-items:center; justify-content:center; border-radius:999px; background:var(--pan); color:var(--pin); font-family:var(--fn); font-weight:700; font-size:13px;\">{{f.ini}}<\u002Fspan>\n                  <input value=\"{{f.value}}\" oninput=\"{{f.onInput}}\" placeholder=\"{{f.placeholder}}\" style=\"flex:1; min-width:0; padding:12px 14px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fb); font-weight:600; font-size:15px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <button onclick=\"{{resetNames}}\" style=\"margin-top:14px; padding:11px 16px; border:1px solid var(--line); background:transparent; color:var(--mut); font-family:var(--fb); font-weight:700; font-size:13px; border-radius:var(--rad); cursor:pointer;\">Reset to Player 1–8<\u002Fbutton>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{isSeasonTab}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:14px; line-height:1.5;\">Each player's finish (1–8) in every major played so far, plus total strokes and missed cuts. Leave a major blank until it's done.<\u002Fdiv>\n            <div style=\"margin-top:14px; padding:13px 15px; background:var(--card); border:1px solid var(--acc); border-radius:var(--rad);\">\n              <div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"font-size:15px;\">⚠️<\u002Fspan><span style=\"font-family:var(--fb); font-weight:700; font-size:12px; letter-spacing:.04em; color:var(--ink);\">BEFORE EACH EVENT — CHECK THE EVENT CODE<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:8px; line-height:1.55;\">Confirm the feed is pointed at this week's tournament: in <b>RapidAPI → Live Golf Data → Schedule<\u002Fb> endpoint (run it for this year), find this event and copy its <b>tournId<\u002Fb>. Then make sure that same id is set as <b>TOURN<\u002Fb> in <code>api/leaderboard.js<\u002Fcode> &amp; <code>api/field.js<\u002Fcode> in your <b>mickeltitties-feed<\u002Fb> repo. Wrong id = wrong field/scores.<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{recordEventResults}}\" style=\"width:100%; margin-top:12px; padding:12px; border:none; background:var(--acc); color:var(--aci); font-family:var(--fb); font-weight:700; font-size:13px; border-radius:var(--rad); cursor:pointer;\">⛳ Auto-fill {{currentEventName}} from live standings<\u002Fbutton>\n            <div style=\"display:flex; padding:14px 2px 4px; font-family:var(--fb); font-weight:700; font-size:10px; letter-spacing:.04em; color:var(--mut);\">\n              <span style=\"flex:1;\">PLAYER<\u002Fspan><span style=\"width:140px; display:flex; gap:4px; justify-content:center;\"><span style=\"width:30px; text-align:center;\">M<\u002Fspan><span style=\"width:30px; text-align:center;\">P<\u002Fspan><span style=\"width:30px; text-align:center;\">U<\u002Fspan><span style=\"width:30px; text-align:center;\">O<\u002Fspan><\u002Fspan><span style=\"width:50px; text-align:center;\">STR<\u002Fspan><span style=\"width:36px; text-align:center;\">MC<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px;\">\n              <sc-for list=\"{{seasonRows}}\" as=\"r\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex; align-items:center; gap:6px;\">\n                  <span style=\"flex:1; min-width:0; font-family:var(--fb); font-weight:600; font-size:13px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{r.name}}<\u002Fspan>\n                  <div style=\"width:140px; display:flex; gap:4px; justify-content:center;\">\n                    <sc-for list=\"{{r.evFields}}\" as=\"e\" hint-placeholder-count=\"4\">\n                      <input value=\"{{e.value}}\" oninput=\"{{e.onInput}}\" inputmode=\"numeric\" style=\"width:30px; padding:8px 0; text-align:center; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fn); font-weight:700; font-size:14px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <input value=\"{{r.strValue}}\" oninput=\"{{r.onStr}}\" inputmode=\"numeric\" placeholder=\"0\" style=\"width:50px; padding:8px 0; text-align:center; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fn); font-weight:700; font-size:14px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                  <input value=\"{{r.mcValue}}\" oninput=\"{{r.onMc}}\" inputmode=\"numeric\" placeholder=\"0\" style=\"width:36px; padding:8px 0; text-align:center; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fn); font-weight:700; font-size:14px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:11px; color:var(--fnt); margin-top:12px; line-height:1.5;\">STR = total strokes to par (e.g. −38). MC = missed cuts. Lowest points wins; strokes break ties.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{isHistoryTab}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:14px; line-height:1.5;\">Past seasons — year, champion (Title), the Cup (last place), and the Cuts award (most missed cuts). These appear in Records.<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px; margin-top:12px;\">\n              <sc-for list=\"{{historyRows}}\" as=\"h\" hint-placeholder-count=\"2\">\n                <div style=\"border:1px solid var(--line); border-radius:var(--rad); padding:10px; display:flex; flex-direction:column; gap:6px;\">\n                  <div style=\"display:flex; align-items:center; gap:6px;\">\n                    <input value=\"{{h.yr}}\" oninput=\"{{h.onYr}}\" inputmode=\"numeric\" placeholder=\"Year (2025)\" style=\"flex:1; min-width:0; padding:9px 10px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fn); font-weight:700; font-size:13px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                    <button onclick=\"{{h.remove}}\" style=\"width:30px; height:30px; flex:none; border:none; background:none; color:var(--dn); font-family:var(--fb); font-weight:700; font-size:18px; cursor:pointer; padding:0;\">×<\u002Fbutton>\n                  <\u002Fdiv>\n                  <input value=\"{{h.champ}}\" oninput=\"{{h.onChamp}}\" placeholder=\"Champion (Title)\" style=\"width:100%; padding:9px 10px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fb); font-weight:600; font-size:13px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                  <input value=\"{{h.cup}}\" oninput=\"{{h.onCup}}\" placeholder=\"Cup (last place)\" style=\"width:100%; padding:9px 10px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fb); font-weight:600; font-size:13px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                  <input value=\"{{h.cuts}}\" oninput=\"{{h.onCuts}}\" placeholder=\"Cuts (most missed cuts)\" style=\"width:100%; padding:9px 10px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fb); font-weight:600; font-size:13px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <button onclick=\"{{addHistory}}\" style=\"margin-top:12px; padding:11px 16px; border:1px dashed var(--line); background:transparent; color:var(--acc); font-family:var(--fb); font-weight:700; font-size:13px; border-radius:var(--rad); cursor:pointer; width:100%;\">+ Add a season<\u002Fbutton>\n            <button onclick=\"{{recordSeasonToHistory}}\" style=\"margin-top:10px; padding:12px; border:none; background:var(--acc); color:var(--aci); font-family:var(--fb); font-weight:700; font-size:13px; border-radius:var(--rad); cursor:pointer; width:100%;\">⛳ Auto-record this season (Champion · Cup · Cuts)<\u002Fbutton>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{isRostersTab}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:14px; line-height:1.5;\">Fix a mis-assigned pick or swap a withdrawn player. Tap any player to reassign them to another participant or replace them. Changes save instantly.<\u002Fdiv>\n            <sc-if value=\"{{noRoster}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"margin-top:16px; padding:22px; background:var(--pan); border-radius:var(--rad); text-align:center; font-family:var(--fb); font-weight:600; font-size:13px; color:var(--psub);\">No players drafted yet.<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"margin-top:14px; display:flex; flex-direction:column; gap:16px;\">\n              <sc-for list=\"{{rosterGroups}}\" as=\"g\" hint-placeholder-count=\"8\">\n                <div>\n                  <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;\"><span style=\"font-family:var(--fb); font-weight:700; font-size:13px; color:var(--ink);\">{{g.name}}<\u002Fspan><span style=\"font-family:var(--fb); font-weight:600; font-size:11px; color:var(--fnt);\">{{g.count}}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex; flex-direction:column; gap:6px;\">\n                    <sc-for list=\"{{g.players}}\" as=\"pl\" hint-placeholder-count=\"5\">\n                      <div onclick=\"{{pl.edit}}\" style=\"display:flex; align-items:center; justify-content:space-between; padding:11px 14px; background:var(--card); border:1px solid var(--line); border-radius:var(--rad); cursor:pointer;\">\n                        <span style=\"font-family:var(--fb); font-weight:600; font-size:14px; color:var(--ink);\">{{pl.name}}<\u002Fspan>\n                        <span style=\"font-family:var(--fb); font-weight:700; font-size:11px; color:var(--acc);\">Edit<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{anyRoster}}\" hint-placeholder-val=\"{{false}}\">\n              <button onclick=\"{{clearDraft}}\" style=\"width:100%; margin-top:20px; padding:13px; border:1px solid var(--dn); background:transparent; color:var(--dn); font-family:var(--fb); font-weight:700; font-size:13px; border-radius:var(--rad); cursor:pointer;\">{{clearDraftLabel}}<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{isScoringTab}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:14px; line-height:1.5;\">Adjust the pool's scoring rules. Changes apply everywhere — standings, the Kitty, and the winner pot — the moment you save.<\u002Fdiv>\n            <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:14px;\">\n              <sc-for list=\"{{scoringFields}}\" as=\"f\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex; align-items:center; gap:12px;\">\n                  <div style=\"flex:1; min-width:0;\">\n                    <div style=\"font-family:var(--fb); font-weight:600; font-size:14px; color:var(--ink);\">{{f.label}}<\u002Fdiv>\n                    <div style=\"font-family:var(--fb); font-weight:500; font-size:11px; color:var(--mut); margin-top:2px; line-height:1.4;\">{{f.hint}}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <input value=\"{{f.value}}\" oninput=\"{{f.onInput}}\" inputmode=\"numeric\" style=\"width:60px; flex:none; padding:11px 0; text-align:center; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fn); font-weight:700; font-size:16px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{isPoolTab}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:14px; line-height:1.5;\">Winning-score guess pool — $10 each to guess the event's winning score (to par). Anyone with a guess entered is in the pool; exact guess(es) split the pot, and if nobody nails it the pot carries to the next event.<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px; margin-top:14px;\">\n              <div style=\"flex:1; font-family:var(--fb); font-weight:600; font-size:13px; color:var(--ink);\">Winning-score pool carryover ($)<\u002Fdiv>\n              <input value=\"{{poolCarryVal}}\" oninput=\"{{onPoolCarry}}\" inputmode=\"numeric\" placeholder=\"0\" style=\"width:64px; flex:none; padding:10px 0; text-align:center; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fn); font-weight:700; font-size:15px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px; margin-top:10px;\">\n              <div style=\"flex:1; font-family:var(--fb); font-weight:600; font-size:13px; color:var(--ink);\">Outright-winner pot carryover ($)<\u002Fdiv>\n              <input value=\"{{poolWinnerCarryVal}}\" oninput=\"{{onPoolWinnerCarry}}\" inputmode=\"numeric\" placeholder=\"0\" style=\"width:64px; flex:none; padding:10px 0; text-align:center; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fn); font-weight:700; font-size:15px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:12px;\">\n              <sc-for list=\"{{poolFields}}\" as=\"f\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex; align-items:center; gap:10px;\">\n                  <sc-if value=\"{{f.isIn}}\" hint-placeholder-val=\"{{true}}\"><button onclick=\"{{f.toggle}}\" style=\"width:30px; height:30px; flex:none; border:none; background:var(--acc); color:var(--aci); border-radius:999px; font-family:var(--fb); font-weight:700; font-size:14px; cursor:pointer;\">✓<\u002Fbutton><\u002Fsc-if>\n                  <sc-if value=\"{{f.notIn}}\" hint-placeholder-val=\"{{false}}\"><button onclick=\"{{f.toggle}}\" style=\"width:30px; height:30px; flex:none; border:1px solid var(--line); background:transparent; color:var(--fnt); border-radius:999px; font-family:var(--fb); font-weight:700; font-size:14px; cursor:pointer;\">+<\u002Fbutton><\u002Fsc-if>\n                  <span style=\"flex:1; min-width:0; font-family:var(--fb); font-weight:600; font-size:14px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{f.name}}<\u002Fspan>\n                  <input value=\"{{f.guess}}\" oninput=\"{{f.onGuess}}\" placeholder=\"−10\" style=\"width:60px; flex:none; padding:9px 0; text-align:center; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fn); font-weight:700; font-size:15px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:11px; color:var(--fnt); margin-top:12px; line-height:1.5;\">Enter guesses to par — e.g. −10 for 10-under, E for even, 2 for +2. The live pot &amp; results show on the Pots tab.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{isSecurityTab}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:14px; line-height:1.55;\">Change the everyday passcode the group uses to open Settings. It syncs to every phone, so set a new code to lock others out. <b>This does not change the owner's master passcode<\u002Fb>, which always works.<\u002Fdiv>\n            <div style=\"margin-top:16px;\">\n              <div style=\"font-family:var(--fb); font-weight:700; font-size:11px; letter-spacing:.06em; color:var(--mut); margin-bottom:6px;\">NEW PASSCODE<\u002Fdiv>\n              <input value=\"{{passNewVal}}\" oninput=\"{{onPassNew}}\" type=\"password\" inputmode=\"numeric\" placeholder=\"New passcode\" style=\"width:100%; padding:13px 14px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fb); font-weight:600; font-size:15px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n              <input value=\"{{passConfirmVal}}\" oninput=\"{{onPassConfirm}}\" type=\"password\" inputmode=\"numeric\" placeholder=\"Confirm new passcode\" style=\"width:100%; margin-top:10px; padding:13px 14px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fb); font-weight:600; font-size:15px; border-radius:var(--rad); outline:none; box-sizing:border-box;\">\n            <\u002Fdiv>\n            <sc-if value=\"{{hasPassMsg}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"font-family:var(--fb); font-weight:600; font-size:12px; margin-top:10px; color:var(--ink);\">{{passMsg}}<\u002Fdiv>\n            <\u002Fsc-if>\n            <button onclick=\"{{changePass}}\" style=\"width:100%; margin-top:16px; padding:14px; border:none; background:var(--acc); color:var(--aci); font-family:var(--fb); font-weight:700; font-size:14px; border-radius:var(--rad); cursor:pointer;\">Update passcode<\u002Fbutton>\n            <sc-if value=\"{{enteredMaster}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"margin-top:14px; padding:11px 14px; background:var(--card); border:1px solid var(--acc); border-radius:var(--rad); font-family:var(--fb); font-weight:600; font-size:12px; color:var(--ink); line-height:1.5;\">🔑 You're in with the master passcode — the permanent owner key.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{showSaveBtn}}\" hint-placeholder-val=\"{{true}}\"><button onclick=\"{{saveSettings}}\" style=\"width:100%; margin-top:22px; padding:14px; border:none; background:var(--acc); color:var(--aci); font-family:var(--fb); font-weight:700; font-size:14px; border-radius:var(--rad); cursor:pointer;\">Save all<\u002Fbutton><\u002Fsc-if>\n\n          <div style=\"margin-top:24px; padding-top:18px; border-top:1px solid var(--line);\">\n            <div style=\"font-family:var(--fb); font-weight:700; font-size:11px; letter-spacing:.09em; color:var(--mut);\">BACKUP &amp; RESTORE<\u002Fdiv>\n            <div style=\"font-family:var(--fb); font-weight:500; font-size:11px; color:var(--fnt); margin-top:4px; line-height:1.5;\">Save a copy of all your data (names, season, history, rules, draft) to a file — or restore from one.<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; margin-top:12px;\">\n              <button onclick=\"{{exportData}}\" style=\"flex:1; padding:12px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fb); font-weight:700; font-size:13px; border-radius:var(--rad); cursor:pointer;\">Download backup<\u002Fbutton>\n              <label style=\"flex:1; padding:12px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:var(--fb); font-weight:700; font-size:13px; border-radius:var(--rad); cursor:pointer; text-align:center;\">Restore<input type=\"file\" accept=\"application/json,.json\" onchange=\"{{importData}}\" style=\"display:none;\"><\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= THEME OVERLAY ================= -->\n    <sc-if value=\"{{showTheme}}\" hint-placeholder-val=\"{{false}}\">\n      <div onclick=\"{{closeTheme}}\" style=\"position:absolute; inset:0; background:rgba(8,12,20,.55); display:flex; flex-direction:column; justify-content:flex-end;\">\n        <div style=\"background:var(--bg); border-top-left-radius:20px; border-top-right-radius:20px; padding:8px 22px 28px; animation:mtUp .3s ease both;\">\n          <div style=\"display:flex; justify-content:center; padding:8px 0 14px;\"><span style=\"width:38px; height:4px; border-radius:999px; background:var(--line);\"><\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:var(--fd); font-size:26px; color:var(--ink); line-height:1;\">Choose Event<\u002Fdiv>\n          <div style=\"font-family:var(--fb); font-weight:500; font-size:12px; color:var(--mut); margin-top:6px;\">Pick the major you're tracking — its look and dates apply across the app. Scores and standings never change.<\u002Fdiv>\n          <div style=\"margin-top:18px; display:flex; flex-direction:column; gap:10px;\">\n            <sc-for list=\"{{themeList}}\" as=\"th\" hint-placeholder-count=\"2\">\n              <div onclick=\"{{th.onClick}}\" style=\"display:flex; align-items:center; gap:14px; padding:14px; background:var(--card); border:1px solid {{th.border}}; border-radius:var(--rad); cursor:pointer;\">\n                <div style=\"display:flex; gap:5px;\">\n                  <span style=\"width:22px; height:34px; border-radius:4px; background:{{th.c1}};\"><\u002Fspan>\n                  <span style=\"width:22px; height:34px; border-radius:4px; background:{{th.c2}};\"><\u002Fspan>\n                  <span style=\"width:22px; height:34px; border-radius:4px; background:{{th.c3}};\"><\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"flex:1;\"><div style=\"font-family:var(--fd); font-size:19px; color:var(--ink); line-height:1;\">{{th.label}}<\u002Fdiv><div style=\"font-family:var(--fb); font-weight:600; font-size:11px; color:var(--mut); margin-top:3px;\">{{th.dates}}<\u002Fdiv><\u002Fdiv>\n                <sc-if value=\"{{th.active}}\" hint-placeholder-val=\"{{true}}\"><span style=\"font-family:var(--fb); font-weight:700; font-size:12px; color:var(--acc);\">✓ Active<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{closeTheme}}\" style=\"width:100%; margin-top:18px; padding:14px; border:1px solid var(--line); background:transparent; color:var(--ink); font-family:var(--fb); font-weight:700; font-size:14px; border-radius:var(--rad); cursor:pointer;\">Done<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:880}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'season', seasonTab: 'standings', detail: null, showTheme: false,\n    showSettings: false, nameDraft: null, settingsUnlocked: false, pin: '', pinErr: false,\n    theme: 'masters',\n    pickIdx: 18, clockDur: 300, clock: 252, running: true, draftLocked: false,\n    live: true, scores: null, lastUpdated: 0,\n    soundOn: true, toast: null, draftSearch: '',\n    drafted: null, field: null, draftOrder: null, rosterEdit: null, rosterSearch: '', eventView: 'pool',\n  };\n\n  THEMES = {\n    masters: {\n      label: 'Augusta', desc: 'Masters greens & soft yellow over off-white',\n      bg:'#F8F7F1', ink:'#0A5135', mut:'#7A8A72', fnt:'#A7B09A', line:'#D8D2BF', card:'#FFFFFF',\n      pan:'#0A4D33', pin:'#F4F0E4', psub:'#B6C9B1', acc:'#0A5135', aci:'#F4F0E4', pnum:'#F4D35E',\n      up:'#1E7A4D', dn:'#C99A00', mci:'#9A7A00', mcl:'#D9B44A', live:'#EFC21A', livei:'#0A5135',\n      rad:'6px', fd:\"'Instrument Serif'\", fb:\"'Hanken Grotesk'\", fn:\"'Instrument Serif'\",\n      c1:'#0A4D33', c2:'#F4D35E', c3:'#F8F7F1',\n    },\n    pga: {\n      label: 'PGA Championship', desc: 'Wanamaker navy, sand & bronze',\n      bg:'#F0E5D8', ink:'#063156', mut:'#8A7259', fnt:'#B7A088', line:'#DBCBB8', card:'#FAF3EA',\n      pan:'#063156', pin:'#F0E5D8', psub:'#9DB0C4', acc:'#A26C40', aci:'#FAF3EA', pnum:'#D7B8A2',\n      up:'#2E6E4E', dn:'#94551B', mci:'#94551B', mcl:'rgba(148,85,27,.42)', live:'#A26C40', livei:'#FAF3EA',\n      rad:'5px', fd:\"'Playfair Display'\", fb:\"'Hanken Grotesk'\", fn:\"'Playfair Display'\",\n      c1:'#063156', c2:'#D7B8A2', c3:'#94551B',\n    },\n    usopen: {\n      label: 'U.S. Open', desc: 'USGA red, navy & silver on white',\n      bg:'#FBFBFD', ink:'#15294D', mut:'#6E7892', fnt:'#AEB6C6', line:'#E4E7EF', card:'#FFFFFF',\n      pan:'#15294D', pin:'#FFFFFF', psub:'#9FB0CC', acc:'#C8102E', aci:'#FFFFFF', pnum:'#FFFFFF',\n      up:'#2E6E4E', dn:'#C8102E', mci:'#C8102E', mcl:'rgba(200,16,46,.42)', live:'#C8102E', livei:'#FFFFFF',\n      rad:'4px', fd:\"'Oswald'\", fb:\"'Hanken Grotesk'\", fn:\"'Oswald'\",\n      c1:'#C8102E', c2:'#15294D', c3:'#A8B0BC',\n    },\n    open: {\n      label: 'The Open', desc: 'St Andrews navy, yellow board & red numerals',\n      bg:'#14274C', ink:'#F5F1E6', mut:'#97A6C4', fnt:'#5C6E94', line:'rgba(245,241,230,.13)', card:'#1C3158',\n      pan:'#F4C518', pin:'#14274C', psub:'#8A6B12', acc:'#F4C518', aci:'#14274C', pnum:'#D0202E',\n      up:'#F4C518', dn:'#F26B72', mci:'#F26B72', mcl:'rgba(242,107,114,.42)', live:'#D0202E', livei:'#FFFFFF',\n      rad:'4px', fd:\"'DM Serif Display'\", fb:\"'Hanken Grotesk'\", fn:\"'DM Serif Display'\",\n      c1:'#14274C', c2:'#F4C518', c3:'#D0202E',\n    },\n  };\n\n  // ============================================================\n  // DEMO_MODE: true  = sample players, scores, season & history (for showing the app off)\n  //            false = CLEAN SLATE for a real season — empty standings/season/records,\n  //                    full draftable field, scoring fills in from the live feed.\n  // Flip this one line to clear all test data before you deploy.\n  // ============================================================\n  DEMO_MODE = false;\n\n  // Passcode for the Settings panel.\n  // MASTER_PASSCODE always works and can never be changed from inside the app — it's the owner's\n  // permanent key back in. The everyday passcode is stored in localStorage and can be changed\n  // (Settings → Lock); changing it does not affect the master.\n  MASTER_PASSCODE = '4839';\n  DEFAULT_PASSCODE = '4839';\n  userPass(){ try{ const p=localStorage.getItem('mtc_pass'); if(p) return p; }catch(e){} return this.DEFAULT_PASSCODE; }\n  seasonStore = {};   // clean-season standings to-date, entered via Settings → Season\n  historyStore = [];  // past-season records, entered via Settings → History\n  scoring = { bestN:4, mcPenalty:2, mcDollar:10, winnerDollar:10 };  // adjustable in Settings → Scoring\n  loadScoring(){ try{ const r=localStorage.getItem('mtc_scoring'); if(r){ const o=JSON.parse(r); this.scoring={ bestN:o.bestN||4, mcPenalty:(o.mcPenalty!=null?o.mcPenalty:2), mcDollar:(o.mcDollar!=null?o.mcDollar:10), winnerDollar:(o.winnerDollar!=null?o.winnerDollar:10) }; } }catch(e){} }\n  scorepoolStore = { carry:0, winnerCarry:0, guesses:{} };  // winning-score guess pool ($10 each, exact guess splits pot, else carries)\n  loadScorePool(){ try{ const r=localStorage.getItem('mtc_scorepool'); if(r){ const o=JSON.parse(r); this.scorepoolStore={ carry:o.carry||0, winnerCarry:o.winnerCarry||0, guesses:o.guesses||{} }; } }catch(e){} }\n\n  // Participant names — fill these in each season (renaming here is all it takes).\n  PARTS = [\n    { id:0, name:'Player 1', ini:'1' },\n    { id:1, name:'Player 2', ini:'2' },\n    { id:2, name:'Player 3', ini:'3' },\n    { id:3, name:'Player 4', ini:'4' },\n    { id:4, name:'Player 5', ini:'5' },\n    { id:5, name:'Player 6', ini:'6' },\n    { id:6, name:'Player 7', ini:'7' },\n    { id:7, name:'Player 8', ini:'8' },\n  ];\n\n  ROSTERS = {\n    0:[['Scottie Scheffler',-12,1],['Patrick Cantlay',-4,1],['Sungjae Im',-1,1],['Corey Conners',2,1],['Keegan Bradley',5,0]],\n    1:[['Rory McIlroy',-10,1],['Justin Thomas',-6,1],['Sepp Straka',-2,1],['Sahith Theegala',1,1],['Cameron Young',4,0]],\n    2:[['Jon Rahm',-8,1],['Hideki Matsuyama',-5,1],['Tony Finau',-3,1],['Max Homa',0,1],['Matt Fitzpatrick',6,0]],\n    3:[['Xander Schauffele',-9,1],['Joaqu\\u00edn Niemann',-7,1],['Shane Lowry',-4,1],['Wyndham Clark',-1,1],['Adam Scott',3,1]],\n    4:[['Collin Morikawa',-6,1],['Tommy Fleetwood',-5,1],['Brooks Koepka',-2,1],['Akshay Bhatia',2,1],['Phil Mickelson',7,0]],\n    5:[['Ludvig \\u00c5berg',-7,1],['Jordan Spieth',-3,1],['Cameron Smith',0,1],['Robert MacIntyre',5,0],['Justin Rose',6,0]],\n    6:[['Bryson DeChambeau',-9,1],['Russell Henley',-3,1],['Will Zalatoris',-1,1],['Sam Burns',3,1],['Patrick Reed',5,0]],\n    7:[['Viktor Hovland',-5,1],['Min Woo Lee',-4,1],['Tom Kim',-1,1],['Brian Harman',1,1],['Dustin Johnson',4,0]],\n  };\n\n  COSMETIC = {\n    0:['\\u22121','thru 14','up'], 1:['\\u22122','thru 16','up'], 2:['\\u22123','F','down'], 3:['\\u22124','thru 15','up'],\n    4:['+1','thru 17','down'], 5:['+3','thru 13','down'], 6:['\\u22122','thru 12',''], 7:['+2','F','down'],\n  };\n\n  // [Masters, PGA, USOpen(live)] finish + season strokes + season missed cuts\n  SEASON = {\n    0:{ev:[3,3,4], str:-38, mc:4}, 1:{ev:[1,4,2], str:-47, mc:3}, 2:{ev:[5,2,3], str:-33, mc:2}, 3:{ev:[2,1,1], str:-52, mc:1},\n    4:{ev:[4,6,5], str:-25, mc:5}, 5:{ev:[7,8,8], str:-2, mc:6}, 6:{ev:[6,5,6], str:-18, mc:3}, 7:{ev:[8,7,7], str:-9, mc:4},\n  };\n\n  initialDrafted() {\n    if (!this.DEMO_MODE) return [];\n    const seq = this.draftSeq();\n    const names = ['Scottie Scheffler','Rory McIlroy','Jon Rahm','Xander Schauffele','Ludvig \\u00c5berg','Collin Morikawa','Bryson DeChambeau','Viktor Hovland','Patrick Cantlay','Justin Thomas','Hideki Matsuyama','Joaqu\\u00edn Niemann','Shane Lowry','Wyndham Clark','Tony Finau','Sungjae Im','Brooks Koepka','Sam Burns'];\n    return names.map((n,i)=>({ player:n, pid:seq[i], pickNo:i+1, session:false }));\n  }\n  initialField() {\n    const pool = [\n      {n:'Tommy Fleetwood',cc:'ENG',odds:'+2000'},{n:'Jordan Spieth',cc:'USA',odds:'+2500'},\n      {n:'Russell Henley',cc:'USA',odds:'+2800'},{n:'Min Woo Lee',cc:'AUS',odds:'+3000'},\n      {n:'Sepp Straka',cc:'AUT',odds:'+3300'},{n:'Cameron Smith',cc:'AUS',odds:'+3500'},\n      {n:'Will Zalatoris',cc:'USA',odds:'+4000'},{n:'Tom Kim',cc:'KOR',odds:'+4500'},\n      {n:'Corey Conners',cc:'CAN',odds:'+5000'},{n:'Sahith Theegala',cc:'USA',odds:'+5000'},\n      {n:'Max Homa',cc:'USA',odds:'+5500'},{n:'Keegan Bradley',cc:'USA',odds:'+6000'},\n      {n:'Cameron Young',cc:'USA',odds:'+6500'},{n:'Matt Fitzpatrick',cc:'ENG',odds:'+7000'},\n      {n:'Adam Scott',cc:'AUS',odds:'+8000'},{n:'Justin Rose',cc:'ENG',odds:'+8000'},\n    ];\n    if (this.DEMO_MODE) return pool;\n    // Clean season: the full field is draftable (in production this is pulled from the live feed a week out).\n    const seeded = ['Scottie Scheffler','Rory McIlroy','Jon Rahm','Xander Schauffele','Ludvig \\u00c5berg','Collin Morikawa','Bryson DeChambeau','Viktor Hovland','Patrick Cantlay','Justin Thomas','Hideki Matsuyama','Joaqu\\u00edn Niemann','Shane Lowry','Wyndham Clark','Tony Finau','Sungjae Im','Brooks Koepka','Sam Burns','Scottie Scheffler'].filter((v,i,a)=>a.indexOf(v)===i).map(n=>({n,cc:'',odds:''}));\n    return seeded.concat(pool);\n  }\n\n  // ===================== LIVE DATA ADAPTER =====================\n  // Swap the sample feed for a real one in TWO lines: set USE_LIVE_FEED = true\n  // and point LIVE_ENDPOINT at your backend (see backend-handoff.md).\n  // The backend must return: { event, updated, players: { \"Player Name\": { score:<toPar int>, cut:<bool> } } }\n  // Everything else — best-4-of-5, missed-cut substitution, pots, standings — recomputes itself.\n  LIVE_ENDPOINT = 'https://mickeltitties-feed.vercel.app/api/leaderboard';\n  FIELD_ENDPOINT = 'https://mickeltitties-feed.vercel.app/api/field';\n  STATE_ENDPOINT = 'https://mickeltitties-feed.vercel.app/api/state';            // set to .../api/state once the shared database is live\n  SYNC_KEY = 'mtc-2026';          // light write-guard shared with the backend\n  USE_LIVE_FEED = true;\n  async pushState(){ if(!this.STATE_ENDPOINT) return; try{ const o=this.gatherData(); this._lastSyncT=o.t; await fetch(this.STATE_ENDPOINT,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ key:this.SYNC_KEY, payload:o }) }); }catch(e){} }\n  async pullState(){ if(!this.STATE_ENDPOINT) return; try{ const r=await fetch(this.STATE_ENDPOINT); const o=await r.json(); if(o&&o.data&&o.t&&o.t>(this._lastSyncT||0)){ this._lastSyncT=o.t; if(this.applyData(o)) this.refreshFromStorage(); } }catch(e){} }\n  // Pull the entire tournament field from the feed for the draft board.\n  async loadLiveField() {\n    try {\n      const r = await fetch(this.FIELD_ENDPOINT + '?event=' + (this.state.theme||'usopen')); const d = await r.json();\n      const list = (d.field || []).map(p => ({ n: p.name, cc: p.country || '', odds: p.odds || '' })).filter(p => p.n);\n      if (!list.length) return;\n      const taken = new Set((this.state.drafted || []).map(x => x.player));\n      this.setState({ field: list.filter(p => !taken.has(p.n)) });\n    } catch (e) {}\n  }\n  baseScores() { if(!this.DEMO_MODE) return {}; const m={}; Object.values(this.ROSTERS).forEach(arr=>arr.forEach(([n,s,c])=>{ m[n]={ s, c:!!c }; })); return m; }\n  async fetchLeaderboard() {\n    if (this.USE_LIVE_FEED) {\n      const r = await fetch(this.LIVE_ENDPOINT + '?event=' + (this.state.theme||'usopen')); const d = await r.json();\n      const out = {};\n      Object.keys(d.players || {}).forEach(name => {\n        const p = d.players[name] || {};\n        const sc = (typeof p.score === 'number') ? p.score : (p.score === 'E' ? 0 : (parseInt(p.score, 10) || 0));\n        out[name] = { s: sc, c: !!p.cut, thru: (p.thru
